<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Welcomme to the web App</h2>
    <form action="{{ url_for('predict_data') }}" method="post">
        <div>
             <label>Gender:</label><br>

            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br>
        </div>
        <div>
            <label for="race">Select Your Race/ethnicity</label>
            <select name="race" id="race">
                <option value="group A">group A</option>
                <option value="group B">group B</option>
                <option value="group C">group C</option>
                <option value="group D">group D</option>
                <option value="group E">group E</option>
            </select>
        </div>
        <div>
            <label for="education">Select parental level of education</label>
            <select name="education" id="education">
                <option value="bachelor's degree">bachelor's degree</option>
                <option value="some college">some college</option>
                <option value="master's degree">master's degree</option>
                <option value="associate's degree">associate's degree</option>
                <option value="high school">high school</option>
                <option value="some high school">some high school</option>
            </select>
        </div>
        <div>
            <label for="lunch">Select Your Lunch Type</label><br>
             <input type="radio" name="lunch" id="standard" value="standard">
             <label for="standard">standard</label><br>
             <input type="radio" name="lunch" id="free/reduced" value="free/reduced">
             <label for="free/reduced">free/reduced</label><br>
        </div>
        <div>
            <label for="testprepare">Select Test Preparation</label><br>
            <input type="radio" name="testprepare" id="none" value="none">
            <label for="none">none</label><br>
            <input type="radio" name="testprepare" id="completed" value="test preparation course">
            <label for="completed">completed</label><br>
        </div>
        <div>
            <label for="read_score">Select your score reading subject</label><br>
             <label for="read_score">Reading Score</label><br><br>
            <input type="number" name="read_score" id="readingscore" placeholder="Enter your reading score"><br>

             <label for="write_score">Select your score writing subject</label><br>
            <label for="write_score">Wriring Score</label><br><br>
            <input type="number" name="write_score" id="writingscore" placeholder="Enter your writing score">
             
            <input type="submit" value="Predict">

        </div>
    </form>
    
      <h1>
        the result is {{results}}
    </h1>
    
</body>
</html>
